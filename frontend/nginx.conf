server {
  listen 80;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers (Task 09): защита от XSS / clickjacking / MIME-sniffing.
  # Применяются на уровне server и наследуются всеми location, пока в них
  # нет собственного add_header. Флаг `always` — чтобы заголовки уходили
  # и на ошибочных ответах (4xx/5xx).
  #
  # CSP подобран под фактическое поведение SPA:
  #  - script-src 'self' — Vite-сборка отдаёт только внешние module-скрипты,
  #    inline <script> не используются, поэтому 'unsafe-inline' НЕ нужен.
  #  - style-src 'self' 'unsafe-inline' — React-компоненты применяют
  #    динамические inline style="..." (размеры, grid-колонки). Внедрять
  #    nonce-инфраструктуру в Nginx ради SPA в MVP избыточно.
  #  - img-src / frame-src 'self' data: blob: — для предпросмотра PDF
  #    через blob URL и потенциальных data-URI ассетов.
  #  - connect-src 'self' — все XHR/fetch идут на same-origin /api.
  #  - object-src 'none' и base-uri 'self' — стандартное усиление.
  #  - frame-ancestors 'none' дублируется X-Frame-Options для совместимости.
  add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self' data:; connect-src 'self'; frame-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'" always;
  # Запрет встраивания страницы в iframe (clickjacking).
  add_header X-Frame-Options "DENY" always;
  # Запрет MIME-sniffing — браузер обязан верить Content-Type сервера.
  add_header X-Content-Type-Options "nosniff" always;
  # Минимизируем утечку URL во внешние ресурсы при навигациях.
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location = /api/rag/answer-with-sources/stream {
    proxy_pass http://backend:8080/api/rag/answer-with-sources/stream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_request_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;
    add_header X-Accel-Buffering "no";
  }

  location /api/ {
    proxy_pass http://backend:8080/api/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    try_files $uri /index.html;
  }
}
