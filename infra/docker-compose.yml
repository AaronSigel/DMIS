services:
  backend:
    build:
      context: ../backend
      args:
        BUILD_BASE_IMAGE: ${BACKEND_BUILD_BASE_IMAGE:-base}
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/dmis}
      DB_USER: ${DB_USER:-dmis}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-dmis-documents}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://embeddings-service:8001}
      AI_BASE_URL: ${AI_BASE_URL:-http://ai-service:8002}
    depends_on:
      postgres:
        condition: service_started
      minio:
        condition: service_started
      embeddings-service:
        condition: service_started
      ai-service:
        condition: service_started
    ports:
      - "8080:8080"

  mcp:
    build:
      context: ../mcp
      args:
        RUNTIME_BASE_IMAGE: ${MCP_RUNTIME_BASE_IMAGE:-base}
    environment:
      BACKEND_BASE_URL: ${BACKEND_BASE_URL:-http://backend:8080/api}
    depends_on:
      backend:
        condition: service_started
    ports:
      - "8090:8090"

  frontend:
    build:
      context: ../frontend
      args:
        BUILD_BASE_IMAGE: ${FRONTEND_BUILD_BASE_IMAGE:-base}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8090/api}
    depends_on:
      mcp:
        condition: service_started
    ports:
      - "5173:80"

  stt-service:
    build:
      context: ../stt-service
      args:
        RUNTIME_BASE_IMAGE: ${STT_RUNTIME_BASE_IMAGE:-base}
    environment:
      MODEL_PATH: ${STT_MODEL_PATH:-/models/whisper-large-v3-turbo}
    volumes:
      - ../models:/models:ro
    ports:
      - "8000:8000"

  embeddings-service:
    build:
      context: ../embeddings-service
      args:
        RUNTIME_BASE_IMAGE: ${EMBEDDINGS_RUNTIME_BASE_IMAGE:-base}
    environment:
      MODEL_PATH: ${EMBEDDINGS_MODEL_PATH:-/models/bge-m3}
      MODEL_RERANKER_PATH: ${EMBEDDINGS_RERANKER_MODEL_PATH:-/models/bge-reranker}
    volumes:
      - ../models:/models:ro
    ports:
      - "8001:8001"

  ai-service:
    build:
      context: ../ai-service
      args:
        RUNTIME_BASE_IMAGE: ${AI_RUNTIME_BASE_IMAGE:-base}
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      AI_MODEL: ${AI_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-}
    expose:
      - "8002"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dmis}
      POSTGRES_USER: ${POSTGRES_USER:-dmis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  postgres_data:
  minio_data:
