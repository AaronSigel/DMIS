services:
  backend:
    build:
      context: ../backend
      args:
        BUILD_BASE_IMAGE: ${BACKEND_BUILD_BASE_IMAGE:-base}
    environment:
      DB_URL: ${DB_URL:-jdbc:postgresql://postgres:5432/dmis}
      DB_USER: ${DB_USER:-dmis}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-demo}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRATION_SECONDS: ${JWT_EXPIRATION_SECONDS:-3600}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT:-http://minio:9000}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minio}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:?MINIO_SECRET_KEY is required}
      MINIO_BUCKET: ${MINIO_BUCKET:-dmis-documents}
      MINIO_PRESIGNED_DOWNLOAD_TTL_SECONDS: ${MINIO_PRESIGNED_DOWNLOAD_TTL_SECONDS:-300}
      EMBEDDINGS_BASE_URL: ${EMBEDDINGS_BASE_URL:-http://embeddings-service:8001}
      AI_BASE_URL: ${AI_BASE_URL:-http://ai-service:8002}
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: ${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:-health,prometheus}
      MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS: ${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:-never}
      # SMTP (Mailpit) для lightweight local-стека.
      SMTP_HOST: ${SMTP_HOST:-mailpit}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_AUTH: ${SMTP_AUTH:-false}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-false}
      SMTP_CONNECT_TIMEOUT_MS: ${SMTP_CONNECT_TIMEOUT_MS:-5000}
      SMTP_READ_TIMEOUT_MS: ${SMTP_READ_TIMEOUT_MS:-10000}
      SMTP_WRITE_TIMEOUT_MS: ${SMTP_WRITE_TIMEOUT_MS:-10000}
      MAIL_FROM: ${MAIL_FROM:-no-reply@dmis.local}
      # IMAP (GreenMail) — используется backend для чтения писем.
      IMAP_HOST: ${IMAP_HOST:-greenmail}
      IMAP_PORT: ${IMAP_PORT:-3993}
      # CalDAV (Radicale) — используется backend для создания событий и free/busy.
      CALDAV_BASE_URL: ${CALDAV_BASE_URL:-http://radicale:5232}
      CALDAV_USERNAME: ${CALDAV_USERNAME:-}
      CALDAV_PASSWORD: ${CALDAV_PASSWORD:-}
      CALDAV_CALENDAR_PATH: ${CALDAV_CALENDAR_PATH:-/}
      # Шифрование секретов интеграций (например, IMAP пароль пользователя)
      INTEGRATIONS_CRYPTO_KEY: ${INTEGRATIONS_CRYPTO_KEY:-}
      # В compose по умолчанию включаем антивирусную проверку загрузок.
      DOCUMENT_SCAN_ENABLED: ${DOCUMENT_SCAN_ENABLED:-true}
      DOCUMENT_SCAN_CLAMAV_HOST: ${DOCUMENT_SCAN_CLAMAV_HOST:-clamav}
      DOCUMENT_SCAN_CLAMAV_PORT: ${DOCUMENT_SCAN_CLAMAV_PORT:-3310}
      DOCUMENT_SCAN_CLAMAV_TIMEOUT_MS: ${DOCUMENT_SCAN_CLAMAV_TIMEOUT_MS:-3000}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_started
      embeddings-service:
        condition: service_healthy
      ai-service:
        condition: service_healthy
      clamav:
        condition: service_healthy
      greenmail:
        condition: service_started
      radicale:
        condition: service_started
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health >/dev/null || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15
      start_period: 20s

  frontend:
    build:
      context: ../frontend
      args:
        BUILD_BASE_IMAGE: ${FRONTEND_BUILD_BASE_IMAGE:-base}
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "5173:80"

  stt-service:
    build:
      context: ../stt-service
      args:
        RUNTIME_BASE_IMAGE: ${STT_RUNTIME_BASE_IMAGE:-base}
    environment:
      MODEL_PATH: ${STT_MODEL_PATH:-/models/whisper-medium}
      MODEL_PATH_FAST: ${STT_MODEL_PATH_FAST:-/models/whisper-small}
      MODEL_PATH_ACCURATE: ${STT_MODEL_PATH_ACCURATE:-/models/whisper-medium}
    volumes:
      - ../models:/models:ro
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health').status == 200 else 1)\""]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  embeddings-service:
    build:
      context: ../embeddings-service
      args:
        RUNTIME_BASE_IMAGE: ${EMBEDDINGS_RUNTIME_BASE_IMAGE:-base}
    environment:
      MODEL_PATH: ${EMBEDDINGS_MODEL_PATH:-/models/bge-m3}
      MODEL_RERANKER_PATH: ${EMBEDDINGS_RERANKER_MODEL_PATH:-/models/bge-reranker-v2-m3}
    volumes:
      - ../models:/models:ro
    ports:
      - "8001:8001"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8001/health').status == 200 else 1)\""]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  ai-service:
    build:
      context: ../ai-service
      args:
        RUNTIME_BASE_IMAGE: ${AI_RUNTIME_BASE_IMAGE:-base}
    environment:
      AI_PROVIDER: ${AI_PROVIDER:-openrouter}
      AI_MODEL: ${AI_MODEL:-openai/gpt-4o-mini}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_APP_URL: ${OPENROUTER_APP_URL:-}
      OPENROUTER_APP_TITLE: ${OPENROUTER_APP_TITLE:-}
    ports:
      - "8002:8002"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8002/health').status == 200 else 1)\""]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 20s

  clamav:
    image: clamav/clamav:stable
    healthcheck:
      test: ["CMD-SHELL", "clamdscan --version >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 15
      start_period: 60s

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  greenmail:
    image: greenmail/standalone:2.1.3
    environment:
      GREENMAIL_OPTS: >-
        -Dgreenmail.setup.test.imaps
    ports:
      - "3993:3993"

  radicale:
    image: tomsquest/docker-radicale:3.3.1.0
    environment:
      RADICALE_AUTH_TYPE: none
      RADICALE_SERVER_HOSTS: 0.0.0.0:5232
    ports:
      - "5232:5232"

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-dmis}
      POSTGRES_USER: ${POSTGRES_USER:-dmis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dmis} -d ${POSTGRES_DB:-dmis}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  prometheus:
    image: prom/prometheus:latest
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=7d"
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      backend:
        condition: service_started
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    depends_on:
      prometheus:
        condition: service_started
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  postgres_data:
  minio_data:
  grafana_data:
  prometheus_data:
