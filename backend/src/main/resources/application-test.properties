spring.datasource.url=${DB_URL:jdbc:h2:mem:dmis;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/{vendor}
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

security.jwt.secret=${JWT_SECRET:test-secret-test-secret-test-secret-test-secret}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

storage.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
storage.minio.access-key=${MINIO_ACCESS_KEY:minio}
storage.minio.secret-key=${MINIO_SECRET_KEY:minio123}
storage.minio.bucket=${MINIO_BUCKET:dmis-documents}

documents.upload.max-size-bytes=${DOCUMENT_UPLOAD_MAX_SIZE_BYTES:20971520}
search.retrieval.top-k=${SEARCH_RETRIEVAL_TOP_K:10}
search.rerank.top-n=${SEARCH_RERANK_TOP_N:5}
search.rag.max-context-chunks=${SEARCH_RAG_MAX_CONTEXT_CHUNKS:3}
search.rag.max-context-chars=${SEARCH_RAG_MAX_CONTEXT_CHARS:4000}
