spring.datasource.url=${DB_URL:jdbc:h2:mem:dmis;MODE=PostgreSQL;DB_CLOSE_DELAY=-1}
spring.datasource.username=${DB_USER:sa}
spring.datasource.password=${DB_PASSWORD:}
spring.jpa.hibernate.ddl-auto=validate
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/{vendor}
spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

security.jwt.secret=${JWT_SECRET:test-secret-test-secret-test-secret-test-secret}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

security.rate-limit.login.capacity=${LOGIN_RATE_LIMIT_CAPACITY:50}
security.rate-limit.login.refill-tokens=${LOGIN_RATE_LIMIT_REFILL:50}
security.rate-limit.login.refill-period-seconds=${LOGIN_RATE_LIMIT_PERIOD_SECONDS:60}

storage.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
storage.minio.access-key=${MINIO_ACCESS_KEY:minio}
storage.minio.secret-key=${MINIO_SECRET_KEY:minio123}
storage.minio.bucket=${MINIO_BUCKET:dmis-documents}
storage.minio.presigned-download-ttl-seconds=${MINIO_PRESIGNED_DOWNLOAD_TTL_SECONDS:300}

documents.upload.max-size-bytes=${DOCUMENT_UPLOAD_MAX_SIZE_BYTES:20971520}
document.scan.enabled=${DOCUMENT_SCAN_ENABLED:false}
document.scan.clamav.host=${DOCUMENT_SCAN_CLAMAV_HOST:localhost}
document.scan.clamav.port=${DOCUMENT_SCAN_CLAMAV_PORT:3310}
document.scan.clamav.timeout-ms=${DOCUMENT_SCAN_CLAMAV_TIMEOUT_MS:3000}

mail.smtp.host=${SMTP_HOST:}
mail.from=${MAIL_FROM:no-reply@test.local}
caldav.base-url=${CALDAV_BASE_URL:}
caldav.username=${CALDAV_USERNAME:}
caldav.password=${CALDAV_PASSWORD:}
caldav.calendar-path=${CALDAV_CALENDAR_PATH:}

indexing.worker.poll-delay-ms=${INDEXING_WORKER_POLL_DELAY_MS:3600000}
indexing.worker.max-attempts=${INDEXING_WORKER_MAX_ATTEMPTS:3}
indexing.worker.running-timeout-ms=${INDEXING_WORKER_RUNNING_TIMEOUT_MS:120000}
http.retry.max-attempts=${HTTP_RETRY_MAX_ATTEMPTS:3}
http.retry.initial-backoff-ms=${HTTP_RETRY_INITIAL_BACKOFF_MS:10}
http.retry.max-backoff-ms=${HTTP_RETRY_MAX_BACKOFF_MS:50}
http.retry.multiplier=${HTTP_RETRY_MULTIPLIER:2.0}
search.retrieval.top-k=${SEARCH_RETRIEVAL_TOP_K:10}
search.rerank.top-n=${SEARCH_RERANK_TOP_N:5}
search.rag.max-context-chunks=${SEARCH_RAG_MAX_CONTEXT_CHUNKS:3}
search.rag.max-context-chars=${SEARCH_RAG_MAX_CONTEXT_CHARS:4000}
ai.intent.structured-path=${AI_INTENT_STRUCTURED_PATH:/v2/chat/structured}
