spring.jpa.open-in-view=false
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

# Local developer defaults
security.jwt.secret=${JWT_SECRET:dev-secret-dev-secret-dev-secret-dev-secret}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}

storage.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
storage.minio.access-key=${MINIO_ACCESS_KEY:minio}
storage.minio.secret-key=${MINIO_SECRET_KEY:minio123}
storage.minio.bucket=${MINIO_BUCKET:dmis-documents}
storage.minio.presigned-download-ttl-seconds=${MINIO_PRESIGNED_DOWNLOAD_TTL_SECONDS:300}

documents.upload.max-size-bytes=${DOCUMENT_UPLOAD_MAX_SIZE_BYTES:20971520}
mail.smtp.host=${SMTP_HOST:localhost}
mail.smtp.port=${SMTP_PORT:1025}
mail.smtp.username=${SMTP_USERNAME:}
mail.smtp.password=${SMTP_PASSWORD:}
mail.smtp.auth=${SMTP_AUTH:false}
mail.smtp.starttls=${SMTP_STARTTLS:false}
mail.smtp.connect-timeout-ms=${SMTP_CONNECT_TIMEOUT_MS:5000}
mail.smtp.read-timeout-ms=${SMTP_READ_TIMEOUT_MS:10000}
mail.smtp.write-timeout-ms=${SMTP_WRITE_TIMEOUT_MS:10000}
mail.from=${MAIL_FROM:no-reply@example.com}
mailpit.base-url=${MAILPIT_BASE_URL:http://localhost:8025}
mailpit.timeout-ms=${MAILPIT_TIMEOUT_MS:5000}
ai.intent.structured-path=${AI_INTENT_STRUCTURED_PATH:/v2/chat/structured}
caldav.base-url=${CALDAV_BASE_URL:http://localhost:5232}
caldav.username=${CALDAV_USERNAME:}
caldav.password=${CALDAV_PASSWORD:}
caldav.calendar-path=${CALDAV_CALENDAR_PATH:/}
