spring.application.name=dmis-backend
server.port=8080
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/dmis}
spring.datasource.username=${DB_USER:dmis}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/common,classpath:db/migration/{vendor}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=20MB

security.jwt.secret=${JWT_SECRET}
security.jwt.expiration-seconds=${JWT_EXPIRATION_SECONDS:3600}
security.jwt.refresh-expiration-seconds=${JWT_REFRESH_EXPIRATION_SECONDS:604800}
security.jwt.refresh-cookie.secure=${REFRESH_COOKIE_SECURE:false}

security.rate-limit.login.capacity=${LOGIN_RATE_LIMIT_CAPACITY:5}
security.rate-limit.login.refill-tokens=${LOGIN_RATE_LIMIT_REFILL:5}
security.rate-limit.login.refill-period-seconds=${LOGIN_RATE_LIMIT_PERIOD_SECONDS:60}

stt.base-url=${STT_BASE_URL:http://stt-service:8000}
stt.connect-timeout-ms=${STT_CONNECT_TIMEOUT_MS:2000}
stt.read-timeout-ms=${STT_READ_TIMEOUT_MS:60000}
stt.default-profile=${STT_DEFAULT_PROFILE:fast}

caldav.base-url=${CALDAV_BASE_URL:}
caldav.username=${CALDAV_USERNAME:}
caldav.password=${CALDAV_PASSWORD:}
caldav.calendar-path=${CALDAV_CALENDAR_PATH:}

mail.smtp.host=${SMTP_HOST:}
mail.smtp.port=${SMTP_PORT:25}
mail.smtp.username=${SMTP_USERNAME:}
mail.smtp.password=${SMTP_PASSWORD:}
mail.smtp.auth=${SMTP_AUTH:false}
mail.smtp.starttls=${SMTP_STARTTLS:false}
mail.smtp.connect-timeout-ms=${SMTP_CONNECT_TIMEOUT_MS:5000}
mail.smtp.read-timeout-ms=${SMTP_READ_TIMEOUT_MS:10000}
mail.smtp.write-timeout-ms=${SMTP_WRITE_TIMEOUT_MS:10000}
mail.from=${MAIL_FROM:no-reply@dmis.local}

# Mailpit HTTP API defaults used by backend mail reader.
mailpit.base-url=${MAILPIT_BASE_URL:http://mailpit:8025}
mailpit.timeout-ms=${MAILPIT_TIMEOUT_MS:5000}

# Crypto for storing integration secrets (e.g., IMAP password).
integrations.crypto.key=${INTEGRATIONS_CRYPTO_KEY:}

mail.attachments.max-count=${MAIL_ATTACHMENTS_MAX_COUNT:10}
mail.attachments.max-total-bytes=${MAIL_ATTACHMENTS_MAX_TOTAL_BYTES:26214400}

storage.minio.endpoint=${MINIO_ENDPOINT:http://localhost:9000}
storage.minio.access-key=${MINIO_ACCESS_KEY:minio}
# –û–±—è–∑–∞—Ç–µ–ª–µ–Ω –ø—Ä–∏ —Ä–∞–±–æ—Ç–µ —Å MinIO; –≤ Docker-—Å—Ç–µ–∫–µ –¥–æ–ª–∂–µ–Ω —Å–æ–≤–ø–∞–¥–∞—Ç—å —Å –ø–∞—Ä–æ–ª–µ–º root MinIO (—Å–º. infra/.env.example).
storage.minio.secret-key=${MINIO_SECRET_KEY}
storage.minio.bucket=${MINIO_BUCKET:dmis-documents}
storage.minio.presigned-download-ttl-seconds=${MINIO_PRESIGNED_DOWNLOAD_TTL_SECONDS:300}

documents.upload.max-size-bytes=${DOCUMENT_UPLOAD_MAX_SIZE_BYTES:20971520}
documents.extracted-text.preview-max-chars=${DOCUMENT_EXTRACTED_TEXT_PREVIEW_MAX_CHARS:2000}
document.scan.enabled=${DOCUMENT_SCAN_ENABLED:false}
document.scan.clamav.host=${DOCUMENT_SCAN_CLAMAV_HOST:localhost}
document.scan.clamav.port=${DOCUMENT_SCAN_CLAMAV_PORT:3310}
document.scan.clamav.timeout-ms=${DOCUMENT_SCAN_CLAMAV_TIMEOUT_MS:3000}

indexing.worker.poll-delay-ms=${INDEXING_WORKER_POLL_DELAY_MS:5000}
indexing.worker.max-attempts=${INDEXING_WORKER_MAX_ATTEMPTS:3}
indexing.worker.running-timeout-ms=${INDEXING_WORKER_RUNNING_TIMEOUT_MS:120000}
http.retry.max-attempts=${HTTP_RETRY_MAX_ATTEMPTS:3}
http.retry.initial-backoff-ms=${HTTP_RETRY_INITIAL_BACKOFF_MS:200}
http.retry.max-backoff-ms=${HTTP_RETRY_MAX_BACKOFF_MS:2000}
http.retry.multiplier=${HTTP_RETRY_MULTIPLIER:2.0}
indexing.executor.core-size=${INDEXING_EXECUTOR_CORE_SIZE:2}
indexing.executor.max-size=${INDEXING_EXECUTOR_MAX_SIZE:4}
indexing.executor.queue-capacity=${INDEXING_EXECUTOR_QUEUE_CAPACITY:100}
search.retrieval.top-k=${SEARCH_RETRIEVAL_TOP_K:10}
search.rerank.top-n=${SEARCH_RERANK_TOP_N:5}
search.rag.max-context-chunks=${SEARCH_RAG_MAX_CONTEXT_CHUNKS:3}
search.rag.max-context-chars=${SEARCH_RAG_MAX_CONTEXT_CHARS:4000}
search.rag.max-tokens=${SEARCH_RAG_MAX_TOKENS:384}
ai.stream.timeout-ms=${AI_STREAM_TIMEOUT_MS:0}
ai.intent.structured-path=${AI_INTENT_STRUCTURED_PATH:/v2/chat/structured}

# Observability (MVP): –ø—É–±–ª–∏–∫—É–µ–º —Ç–æ–ª—å–∫–æ health –∏ prometheus.
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,prometheus}
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}
management.endpoint.prometheus.enabled=${MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED:true}
management.prometheus.metrics.export.enabled=${MANAGEMENT_PROMETHEUS_METRICS_EXPORT_ENABLED:true}

# Structured logging (JSON) + MDC correlation keys.
# MDC keys:
# - traceId: request correlation id from X-Trace-Id (or generated per request)
# - userId: authenticated user id resolved from SecurityContext
# - ragId: RAG correlation id from X-Rag-Id (optional, if present in request)
logging.structured.format.console=${LOGGING_STRUCTURED_FORMAT_CONSOLE:logstash}
